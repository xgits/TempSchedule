<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GDC 2026 Schedule</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%); color: #1f2937; min-height: 100vh; }
.wrap { max-width: 1000px; margin: 0 auto; padding: 48px 24px 64px; }
.hero { margin-bottom: 28px; }
.hero h1 { font-size: 36px; margin-bottom: 8px; }
.hero p { color: #475569; font-size: 16px; }
.day-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.day-card {
    display: block; text-decoration: none; color: inherit;
    background: rgba(255,255,255,0.9); border: 1px solid #dbe4ff; border-radius: 16px;
    padding: 18px; box-shadow: 0 10px 30px rgba(37, 99, 235, 0.08);
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
}
.day-card:hover { transform: translateY(-2px); box-shadow: 0 14px 36px rgba(37, 99, 235, 0.14); border-color: #93c5fd; }
.day-card-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.day-card-date { font-size: 13px; color: #2563eb; margin-bottom: 10px; font-weight: 600; }
.day-card-meta { font-size: 13px; color: #64748b; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>GDC 2026 Schedule</h1>
    <p>Select a day to view the schedule.</p>
  </div>
  <div class="day-grid">
    <a class="day-card" href="./schedule_Monday.html">
      <div class="day-card-title">Monday</div>
      <div class="day-card-date">2026-03-09</div>
      <div class="day-card-meta">Schedule</div>
    </a>
    <a class="day-card" href="./schedule_Tuesday.html">
      <div class="day-card-title">Tuesday</div>
      <div class="day-card-date">2026-03-10</div>
      <div class="day-card-meta">Schedule</div>
    </a>
    <a class="day-card" href="./schedule_Wednesday.html">
      <div class="day-card-title">Wednesday</div>
      <div class="day-card-date">2026-03-11</div>
      <div class="day-card-meta">Schedule</div>
    </a>
    <a class="day-card" href="./schedule_Thursday.html">
      <div class="day-card-title">Thursday</div>
      <div class="day-card-date">2026-03-12</div>
      <div class="day-card-meta">Schedule</div>
    </a>
    <a class="day-card" href="./schedule_Friday.html">
      <div class="day-card-title">Friday</div>
      <div class="day-card-date">2026-03-13</div>
      <div class="day-card-meta">Schedule</div>
    </a>
  </div>
</div>
</body>
</html>
